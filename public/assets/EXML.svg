<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the 'Learning Line' -->
    <linearGradient id="learningGrad" x1="20" y1="180" x2="180" y2="20">
      <stop offset="0%" stop-color="#3EFFA9" /> <!-- Neon Lime -->
      <stop offset="100%" stop-color="#00D1FF" /> <!-- Cyan -->
    </linearGradient>

    <!-- Glow effect for the boundary -->
    <filter id="boundaryGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Data Cluster A (Top Left) -->
  <circle cx="50" cy="50" r="6" fill="#00D1FF" fill-opacity="0.2" />
  <circle cx="75" cy="40" r="4" fill="#00D1FF" fill-opacity="0.4" />
  <circle cx="40" cy="80" r="5" fill="#00D1FF" fill-opacity="0.6" />

  <!-- Data Cluster B (Bottom Right) -->
  <circle cx="150" cy="150" r="6" fill="#3EFFA9" fill-opacity="0.2" />
  <circle cx="125" cy="160" r="4" fill="#3EFFA9" fill-opacity="0.4" />
  <circle cx="160" cy="120" r="5" fill="#3EFFA9" fill-opacity="0.6" />

  <!-- The Decision Boundary Line (The Algorithm) -->
  <g filter="url(#boundaryGlow)">
    <path d="M20 180 C 60 140, 140 60, 180 20"
          stroke="url(#learningGrad)" stroke-width="10" stroke-linecap="round" />

    <!-- The Convergence Point (Focus) -->
    <circle cx="100" cy="100" r="6" fill="white" />
  </g>

  <!-- Subtle Grid (Mathematical Precision) -->
  <path d="M20 20 H180 V180 H20 Z" stroke="white" stroke-opacity="0.05" stroke-width="1" />
</svg>